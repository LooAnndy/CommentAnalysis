<!DOCTYPE html>
<html>

<head>
    <title>登录</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("../static/img/bg.jpeg") no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        .card {
            /* 随内容收缩和扩展 */
            display: inline-flex;
            flex-direction: column;
            align-items: center;

            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;

            /* 周围一圈的大小 */
            padding: 40px;

            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .qrPart {
            flex: 1;
            padding: 20px;
        }

        h3 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #ffffff33;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #ffffff55;
        }
        
        .qrPart {
            text-align: center;
        }

        #qrcode {
            margin-top: 10px;
            border-radius: 10px;
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="card">


        <!-- 扫码登录 -->
        <div class="qrPart">
            <h3>扫码登录</h3>

            <img id="qrcode" width="180">

            <p id="status">等待扫码...</p>
        </div>

    </div>

    <script type="module" src="/static/js/pages/login.js"></script>

</body>

</html>
