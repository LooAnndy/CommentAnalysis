<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <title>B站评论多维对比看板</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="/static/js/echarts.min.js"></script>
</head>
<body>
    <main class="dashboard">
        <header class="top-bar card">
            <div class="top-title">
                <h1>B站评论多维对比看板</h1>
                <p>Google Trends 风格框架（前端/JS骨架）</p>
            </div>
            <div class="top-actions">
                <input id="bvInput" type="text" placeholder="输入 BV 号后点击添加">
                <button id="addBvBtn" class="btn-primary">添加对比</button>
                <button id="crawlBtn" class="btn-secondary">抓取数据</button>
                <button id="refreshBtn" class="btn-secondary">刷新看板</button>
            </div>
            <div class="top-filters">
                <select id="sourceSelect">
                    <option value="">从本地历史选择 BV</option>
                </select>
                <select id="trendModeSelect">
                    <option value="count">绝对评论数</option>
                    <option value="percent">百分比热度</option>
                </select>
                <select id="timeGranularitySelect">
                    <option value="day">按天</option>
                    <option value="hour">按小时</option>
                </select>
            </div>
            <div id="tagList" class="tag-list"></div>
            <div id="progressBox" class="progress-box" hidden>
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <p id="progressText">等待任务...</p>
            </div>
        </header>

        <section class="grid-board">
            <article class="card card-trend">
                <div class="card-header">
                    <h2>时间轴热度对比</h2>
                    <span>支持缩放联动（预留）</span>
                </div>
                <div id="trendChart" class="chart-box"></div>
            </article>

            <article class="card card-geo">
                <div class="card-header">
                    <h2>地理分布</h2>
                    <span>地图热力（预留）</span>
                </div>
                <div id="geoChart" class="chart-box"></div>
            </article>

            <article class="card card-wordcloud">
                <div class="card-header">
                    <h2>词云对比</h2>
                    <span>多 BV 并排（预留）</span>
                </div>
                <div id="wordcloudChart" class="chart-box"></div>
            </article>

            <article class="card card-level">
                <div class="card-header">
                    <h2>用户等级分布</h2>
                    <span>堆叠柱图（预留）</span>
                </div>
                <div id="levelChart" class="chart-box"></div>
            </article>
        </section>
    </main>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
